# The Site Configuration
# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage
lang: en

# Change to your timezone
timezone: Asia/Colombo

# jekyll-seo-tag settings
title: My Daily Progress Journal          # ← Change this if you want
tagline: Daily accountability logs for coding, learning & growth
description: >-
  My personal daily progress journal to stay consistent and accountable.

# Fill in the protocol & hostname for your site.
# Do NOT put a trailing slash at the end.
url: "https://profrdunkenstein.github.io"

github:
  username: profrdunkenstein

twitter:
  username: ""   # leave empty if you don't use Twitter

social:
  name: Mithurangan                     # your name / display name
  email: ""                             # optional
  fediverse_handle: ""
  links:
    - https://github.com/profrdunkenstein   # your GitHub profile
    # Add more links if you want:
    # - https://twitter.com/yourhandle

# Web Analytics (leave empty for now)
analytics:
  google:
    id: 
  goatcounter:
    id: 

# Prefer color scheme (empty = follow system + toggle)
theme_mode: 

# Avatar (optional - you can add an image later in assets/img/)
avatar: 

# Global TOC in posts
toc: true

comments:
  provider: ""   # keep empty to disable comments for now

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
